  #back
  usuarios-service:
    build: ./LIbrOnline-Backend/Usuarios
    ports:
      - "5000:5000"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db-usuarios:3306/usuarios?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    depends_on:
      db-usuarios:
