services:
  #front
  school:
    build:
      context: ./LibrOnlinefrontendv2
      dockerfile: Dockerfile.school
    ports:
      - "80:80"
    depends_on:
      - api-server

  #gateway
  api-server:
    build:
      context: ./LibrOnlinefrontendv2
      dockerfile: Dockerfile.api-server
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - NODE_ENV=production
      - DATABASE_URL=postgres://postgres:postgres@db-api-server:5432/libronline
      - USUARIOS_API_URL=http://usuarios-service:5000
      - CURSOS_API_URL=http://gestion-cursos-service:5003
      - NOTAS_API_URL=http://notas-service:8000
      - ASISTENCIA_API_URL=http://asistencia-service:5005
      - ANOTACIONES_API_URL=http://anotaciones-service:5006
      - REUNIONES_API_URL=http://gestion-reuniones-service:5002
    depends_on:
      db-api-server:
        condition: service_healthy
      usuarios-service:
        condition: service_started
      gestion-cursos-service:
        condition: service_started
      notas-service:
        condition: service_started
      asistencia-service:
        condition: service_started
      anotaciones-service:
        condition: service_started
      gestion-reuniones-service:
        condition: service_started

  #bd
  db-api-server:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: libronline
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  db-usuarios:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: usuarios
      MYSQL_USER: microservicio
      MYSQL_PASSWORD: system
      MYSQL_ROOT_PASSWORD: root
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  db-asistencia:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: db_asistencia
      MYSQL_USER: user_asistencia
      MYSQL_PASSWORD: pass_asistencia
      MYSQL_ROOT_PASSWORD: root
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  db-anotaciones:
